<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Web Development, App Development & DevOps Company | CloudyAI</title>
    <meta name="description" content="CloudyAI is a top-rated IT company delivering web development, app development, DevOps, AI agents & digital transformation services. Book a free consultation today." />
    <meta name="keywords" content="web development company, app development company, devops company, IT company, software development company, AI development, mobile app development, cloud services, digital transformation, custom software development, React development, Flutter app development, Laravel development, Node.js development, SEO services, AI agents, automation, enterprise software" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="CloudyAI" />
    <link rel="canonical" href="https://cloudyai.in/" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cloudyai.in/" />
    <meta property="og:title" content="Web Development, App Development & DevOps Company | CloudyAI" />
    <meta property="og:description" content="CloudyAI is a top-rated IT company delivering web development, app development, DevOps, AI agents & digital transformation services." />
    <meta property="og:image" content="https://cloudyai.in/og-image.png" />
    <meta property="og:site_name" content="CloudyAI" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@cloudyai_in" />
    <meta name="twitter:title" content="Web Development, App Development & DevOps Company | CloudyAI" />
    <meta name="twitter:description" content="CloudyAI delivers web development, app development, DevOps, AI agents & IT services. Book a free consultation." />
    <meta name="twitter:image" content="https://cloudyai.in/og-image.png" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "CloudyAI",
      "url": "https://cloudyai.in",
      "logo": "https://cloudyai.in/favicon.svg",
      "description": "CloudyAI is a premier IT company specializing in web development, app development, DevOps, AI agents, and digital transformation.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "Info.cloudyai@gmail.com",
        "availableLanguage": "English"
      },
      "sameAs": [
        "https://www.linkedin.com/company/cloudyai",
        "https://twitter.com/cloudyai_in"
      ],
      "serviceType": ["Web Development", "App Development", "DevOps Consulting", "AI Development", "Digital Transformation"]
    }
    </script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CloudyAI",
      "url": "https://cloudyai.in",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://cloudyai.in/?s={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
